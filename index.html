<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048糖猫合成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Comic Sans MS", "Chalkboard SE", "Marker Felt", "Comic Neue", cursive;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #fff5f0 0%, #ffe4e1 50%, #fff0e6 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .game-container {
            width: 500px;
            margin: 0 auto;
            padding: 20px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(255, 140, 0, 0.15), 0 0 0 3px rgba(255, 182, 193, 0.5);
            backdrop-filter: blur(10px);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 5px;
        }

        h1 {
            font-size: 42px;
            font-weight: bold;
            color: #ff6b6b;
            text-shadow: 2px 2px 0px #ffe4e1, 4px 4px 0px rgba(255, 140, 0, 0.2);
            letter-spacing: 1px;
        }

        .score-container {
            background: linear-gradient(145deg, #ffb6c1, #ff6b6b);
            padding: 12px 22px;
            border-radius: 18px;
            color: white;
            text-align: center;
            box-shadow: 0 4px 0px #e55a5a;
        }

        .score-title {
            font-size: 12px;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
        }

        #score {
            font-size: 28px;
            font-weight: bold;
        }

        #restart-btn {
            background: linear-gradient(145deg, #ffb347, #ff8c00);
            color: white;
            border: none;
            border-radius: 18px;
            padding: 12px 22px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0px #e67e00;
            transition: all 0.1s ease;
        }

        #restart-btn:hover {
            transform: translateY(2px);
            box-shadow: 0 2px 0px #e67e00;
        }

        #restart-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0px #e67e00;
        }

        .game-board {
            width: 100%;
            aspect-ratio: 1/1;
            background: linear-gradient(145deg, #fff0f5, #ffe4e1);
            border-radius: 20px;
            padding: 15px;
            position: relative;
            touch-action: none;
            box-shadow: 0 8px 0px #f8c8d0, inset 0 2px 10px rgba(255, 255, 255, 0.8);
            border: 3px solid rgba(255, 182, 193, 0.6);
            transition: transform 0.1s ease-out;
        }

        .game-board:active {
            transform: scale(0.99);
        }

        .grid-container {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 15px;
        }

        .grid-cell {
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: inset 0 2px 4px rgba(255, 140, 0, 0.1);
            border: 2px solid rgba(255, 182, 193, 0.3);
        }

        .tile {
            position: absolute;
            width: 106.25px;
            height: 106.25px;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0;
            font-weight: bold;
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            box-shadow: 0 4px 8px rgba(255, 107, 107, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.6);
        }

        /* 不同数字方块的图片（请确保图片文件在同一目录下） */
        .tile-2 { background-image: url('2.png'); }
        .tile-4 { background-image: url('4.png'); }
        .tile-8 { background-image: url('8.png'); }
        .tile-16 { background-image: url('16.png'); }
        .tile-32 { background-image: url('32.png'); }
        .tile-64 { background-image: url('64.png'); }
        .tile-128 { background-image: url('128.png'); }
        .tile-256 { background-image: url('256.png'); }
        .tile-512 { background-image: url('512.png'); }
        .tile-1024 { background-image: url('1024.png'); }
        .tile-2048 { background-image: url('2048.png'); }
        .tile-super { background-image: url('super.png'); }

        /* 自定义表情图片样式 */
        .emoji-img {
            width: 60px;
            height: 60px;
            vertical-align: middle;
            margin-right: 10px;
            object-fit: contain;
        }

        /* 结局弹窗样式 */
        .game-end {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 245, 240, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }

        .game-end h2 {
            font-size: 50px;
            font-weight: bold;
            margin-bottom: 15px;
            text-shadow: 2px 2px 0px rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-end p {
            font-size: 22px;
            color: #8b7355;
            margin-bottom: 30px;
        }

        .success-title {
            color: #ff8c00;
        }

        .fail-title {
            color: #ff6b6b;
        }

        .restart-btn {
            background: linear-gradient(145deg, #ffb6c1, #ff6b6b);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 15px 35px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 0px #e55a5a;
            transition: all 0.1s ease;
        }

        .restart-btn:hover {
            transform: translateY(2px);
            box-shadow: 0 3px 0px #e55a5a;
        }

        .restart-btn:active {
            transform: translateY(5px);
            box-shadow: 0 0px 0px #e55a5a;
        }

        /* 移动端响应式适配 */
        @media (max-width: 520px) {
            body {
                padding-top: 10px;
                padding: 10px;
            }
            
            .game-container {
                width: 100%;
                padding: 15px;
                border-radius: 20px;
            }
            
            h1 {
                font-size: 28px;
                text-shadow: 1px 1px 0px #ffe4e1, 2px 2px 0px rgba(255, 140, 0, 0.2);
            }
            
            .score-container {
                padding: 8px 15px;
                border-radius: 14px;
            }
            
            .score-title {
                font-size: 10px;
            }
            
            #score {
                font-size: 22px;
            }
            
            #restart-btn {
                padding: 8px 15px;
                font-size: 16px;
                border-radius: 14px;
            }
            
            .game-board {
                border-radius: 16px;
                padding: 3vw;
            }
            
            .grid-container {
                gap: 3vw;
            }
            
            .grid-cell {
                border-radius: 12px;
            }
            
            .tile {
                width: calc((100% - 6vw - 9vw) / 4);
                height: calc((100% - 6vw - 9vw) / 4);
                border-radius: 12px;
            }
            
            .emoji-img {
                width: 40px;
                height: 40px;
                margin-right: 8px;
            }
            
            .game-end h2 {
                font-size: 35px;
            }
            
            .game-end p {
                font-size: 16px;
            }
            
            .restart-btn {
                padding: 12px 28px;
                font-size: 18px;
                border-radius: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>糖猫合成器</h1>
            <div>
                <div class="score-container">
                    <div class="score-title">分数</div>
                    <div id="score">0</div>
                </div>
            </div>
            <button id="restart-btn">重新开始</button>
        </div>

        <div class="game-board">
            <div class="grid-container">
                <!-- 16个背景格子 -->
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
            </div>

            <!-- 成功弹窗 -->
            <div class="game-end" id="success-end">
                <h2 class="success-title">🤣 太棒了！</h2>
                <p>米雪儿为你感到骄傲！</p>
                <button id="success-restart" class="restart-btn">再来一局</button>
            </div>

            <!-- 失败弹窗 -->
            <div class="game-end" id="fail-end">
                <h2 class="fail-title">😭 没关系的</h2>
                <p>米雪儿相信你下次一定能成功！</p>
                <button id="fail-restart" class="restart-btn">再来一局</button>
            </div>
        </div>
    </div>

    <script>
        class Game2048 {
            constructor() {
                this.grid = Array(4).fill().map(() => Array(4).fill(0));
                this.score = 0;
                this.gameOver = false;
                this.hasReached2048 = false;
                this.hasPlayedMergeSoundThisMove = false;
                
                // 滑动优化参数
                this.touchStartX = 0;
                this.touchStartY = 0;
                this.touchStartTime = 0;
                this.isSwiping = false;
                this.minSwipeDistance = 20; // 动态调整的最小滑动距离
                this.minSwipeTime = 50; // 最小滑动时间(ms)，防止点击误触
                this.directionThreshold = 1.5; // 方向判断阈值，越大越不容易误判
                
                this.init();
            }

            init() {
                this.generateRandomTile();
                this.generateRandomTile();
                this.render();
                this.bindEvents();
            }

            generateRandomTile() {
                const emptyCells = [];
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (this.grid[i][j] === 0) {
                            emptyCells.push({row: i, col: j});
                        }
                    }
                }

                if (emptyCells.length === 0) return false;

                const randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                this.grid[randomCell.row][randomCell.col] = Math.random() < 0.9 ? 2 : 4;
                return true;
            }

            render() {
                document.querySelectorAll('.tile').forEach(tile => tile.remove());

                const gameBoard = document.querySelector('.game-board');
                const boardSize = gameBoard.offsetWidth;
                const padding = boardSize * 0.03;
                const gap = boardSize * 0.03;
                const tileSize = (boardSize - 2 * padding - 3 * gap) / 4;

                // 动态调整最小滑动距离（基于屏幕尺寸）
                this.minSwipeDistance = tileSize * 0.2;

                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (this.grid[i][j] !== 0) {
                            const tile = document.createElement('div');
                            const value = this.grid[i][j];
                            
                            tile.className = `tile tile-${value > 2048 ? 'super' : value}`;
                            tile.textContent = value;
                            
                            const left = j * (tileSize + gap) + padding;
                            const top = i * (tileSize + gap) + padding;
                            tile.style.left = `${left}px`;
                            tile.style.top = `${top}px`;

                            document.querySelector('.game-board').appendChild(tile);
                        }
                    }
                }

                document.getElementById('score').textContent = this.score;
            }

            playMergeSound() {
                if (this.hasPlayedMergeSoundThisMove) return;
                
                const audio = new Audio('merge.mp3');
                audio.volume = 0.8;
                audio.play().catch(err => console.log('合成音效未找到:', err));
                
                this.hasPlayedMergeSoundThisMove = true;
            }

            playSuccessSound() {
                const audio = new Audio('success.mp3');
                audio.volume = 0.9;
                audio.play().catch(err => console.log('成功音效未找到:', err));
            }

            playFailSound() {
                const audio = new Audio('fail.mp3');
                audio.volume = 0.9;
                audio.play().catch(err => console.log('失败音效未找到:', err));
            }

            move(direction) {
                if (this.gameOver) return;

                this.hasPlayedMergeSoundThisMove = false;
                
                let moved = false;

                switch (direction) {
                    case 'up':
                        moved = this.moveUp();
                        break;
                    case 'down':
                        moved = this.moveDown();
                        break;
                    case 'left':
                        moved = this.moveLeft();
                        break;
                    case 'right':
                        moved = this.moveRight();
                        break;
                }

                if (moved) {
                    this.generateRandomTile();
                    this.checkGameEnd();
                    this.render();
                }
            }

            moveLeft() {
                let moved = false;
                for (let i = 0; i < 4; i++) {
                    let row = this.grid[i].filter(val => val !== 0);
                    
                    for (let j = 0; j < row.length - 1; j++) {
                        if (row[j] === row[j + 1]) {
                            row[j] *= 2;
                            this.score += row[j];
                            if (row[j] === 2048 && !this.hasReached2048) {
                                this.hasReached2048 = true;
                            }
                            this.playMergeSound();
                            row.splice(j + 1, 1);
                            moved = true;
                        }
                    }

                    while (row.length < 4) {
                        row.push(0);
                    }

                    if (JSON.stringify(this.grid[i]) !== JSON.stringify(row)) {
                        this.grid[i] = row;
                        moved = true;
                    }
                }
                return moved;
            }

            moveRight() {
                let moved = false;
                for (let i = 0; i < 4; i++) {
                    let row = this.grid[i].filter(val => val !== 0);
                    
                    for (let j = row.length - 1; j > 0; j--) {
                        if (row[j] === row[j - 1]) {
                            row[j] *= 2;
                            this.score += row[j];
                            if (row[j] === 2048 && !this.hasReached2048) {
                                this.hasReached2048 = true;
                            }
                            this.playMergeSound();
                            row.splice(j - 1, 1);
                            j--;
                            moved = true;
                        }
                    }

                    while (row.length < 4) {
                        row.unshift(0);
                    }

                    if (JSON.stringify(this.grid[i]) !== JSON.stringify(row)) {
                        this.grid[i] = row;
                        moved = true;
                    }
                }
                return moved;
            }

            moveUp() {
                let moved = false;
                for (let j = 0; j < 4; j++) {
                    let col = [];
                    for (let i = 0; i < 4; i++) {
                        if (this.grid[i][j] !== 0) {
                            col.push(this.grid[i][j]);
                        }
                    }

                    for (let i = 0; i < col.length - 1; i++) {
                        if (col[i] === col[i + 1]) {
                            col[i] *= 2;
                            this.score += col[i];
                            if (col[i] === 2048 && !this.hasReached2048) {
                                this.hasReached2048 = true;
                            }
                            this.playMergeSound();
                            col.splice(i + 1, 1);
                            moved = true;
                        }
                    }

                    while (col.length < 4) {
                        col.push(0);
                    }

                    for (let i = 0; i < 4; i++) {
                        if (this.grid[i][j] !== col[i]) {
                            this.grid[i][j] = col[i];
                            moved = true;
                        }
                    }
                }
                return moved;
            }

            moveDown() {
                let moved = false;
                for (let j = 0; j < 4; j++) {
                    let col = [];
                    for (let i = 0; i < 4; i++) {
                        if (this.grid[i][j] !== 0) {
                            col.push(this.grid[i][j]);
                        }
                    }

                    for (let i = col.length - 1; i > 0; i--) {
                        if (col[i] === col[i - 1]) {
                            col[i] *= 2;
                            this.score += col[i];
                            if (col[i] === 2048 && !this.hasReached2048) {
                                this.hasReached2048 = true;
                            }
                            this.playMergeSound();
                            col.splice(i - 1, 1);
                            i--;
                            moved = true;
                        }
                    }

                    while (col.length < 4) {
                        col.unshift(0);
                    }

                    for (let i = 0; i < 4; i++) {
                        if (this.grid[i][j] !== col[i]) {
                            this.grid[i][j] = col[i];
                            moved = true;
                        }
                    }
                }
                return moved;
            }

            checkGameEnd() {
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (this.grid[i][j] === 0) {
                            return false;
                        }
                    }
                }

                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (j < 3 && this.grid[i][j] === this.grid[i][j + 1]) {
                            return false;
                        }
                        if (i < 3 && this.grid[i][j] === this.grid[i + 1][j]) {
                            return false;
                        }
                    }
                }

                this.gameOver = true;
                
                if (this.hasReached2048) {
                    document.getElementById('success-end').style.display = 'flex';
                    this.playSuccessSound();
                } else {
                    document.getElementById('fail-end').style.display = 'flex';
                    this.playFailSound();
                }
                
                return true;
            }

            restart() {
                this.grid = Array(4).fill().map(() => Array(4).fill(0));
                this.score = 0;
                this.gameOver = false;
                this.hasReached2048 = false;
                this.hasPlayedMergeSoundThisMove = false;
                document.getElementById('success-end').style.display = 'none';
                document.getElementById('fail-end').style.display = 'none';
                this.generateRandomTile();
                this.generateRandomTile();
                this.render();
            }

            // 优化后的触摸滑动处理
            handleTouchStart(e) {
                if (this.gameOver) return;
                
                this.touchStartX = e.touches[0].clientX;
                this.touchStartY = e.touches[0].clientY;
                this.touchStartTime = Date.now();
                this.isSwiping = true;
            }

            handleTouchMove(e) {
                if (!this.isSwiping || this.gameOver) return;
                e.preventDefault(); // 防止页面滚动
            }

            handleTouchEnd(e) {
                if (!this.isSwiping || this.gameOver) return;
                
                this.isSwiping = false;
                
                const touchEndX = e.changedTouches[0].clientX;
                const touchEndY = e.changedTouches[0].clientY;
                const touchEndTime = Date.now();
                
                const deltaX = touchEndX - this.touchStartX;
                const deltaY = touchEndY - this.touchStartY;
                const deltaTime = touchEndTime - this.touchStartTime;
                
                // 过滤掉点击和太短的滑动
                if (deltaTime < this.minSwipeTime) return;
                
                const absDeltaX = Math.abs(deltaX);
                const absDeltaY = Math.abs(deltaY);
                
                // 方向判断：只有当一个方向的偏移量明显大于另一个方向时才触发
                if (absDeltaX > absDeltaY * this.directionThreshold) {
                    // 水平滑动
                    if (absDeltaX > this.minSwipeDistance) {
                        if (deltaX > 0) {
                            this.move('right');
                        } else {
                            this.move('left');
                        }
                    }
                } else if (absDeltaY > absDeltaX * this.directionThreshold) {
                    // 垂直滑动
                    if (absDeltaY > this.minSwipeDistance) {
                        if (deltaY > 0) {
                            this.move('down');
                        } else {
                            this.move('up');
                        }
                    }
                }
                // 斜向滑动不触发任何操作
            }

            bindEvents() {
                // 键盘事件
                document.addEventListener('keydown', (e) => {
                    switch (e.key) {
                        case 'ArrowUp':
                            e.preventDefault();
                            this.move('up');
                            break;
                        case 'ArrowDown':
                            e.preventDefault();
                            this.move('down');
                            break;
                        case 'ArrowLeft':
                            e.preventDefault();
                            this.move('left');
                            break;
                        case 'ArrowRight':
                            e.preventDefault();
                            this.move('right');
                            break;
                    }
                });

                // 优化后的触摸事件
                const gameBoard = document.querySelector('.game-board');
                gameBoard.addEventListener('touchstart', (e) => this.handleTouchStart(e), {passive: true});
                gameBoard.addEventListener('touchmove', (e) => this.handleTouchMove(e), {passive: false});
                gameBoard.addEventListener('touchend', (e) => this.handleTouchEnd(e), {passive: true});

                document.getElementById('restart-btn').addEventListener('click', () => {
                    this.restart();
                });

                document.getElementById('success-restart').addEventListener('click', () => {
                    this.restart();
                });

                document.getElementById('fail-restart').addEventListener('click', () => {
                    this.restart();
                });

                window.addEventListener('resize', () => {
                    this.render();
                });
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            new Game2048();
        });
    </script>
</body>
</html>
